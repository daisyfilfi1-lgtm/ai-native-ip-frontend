[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  # ⚠️ API 密钥：不要在代码库中设置真实值！
  # 请在 Netlify Dashboard → Site settings → Environment variables 中设置:
  # NEXT_PUBLIC_API_KEY = your-secret-key-here
  # 开发环境可以在 .env.local 中设置

# ─────────────────────────────────────────────
# Edge Functions 配置
# ─────────────────────────────────────────────
[[edge_functions]]
  function = "api-proxy"
  path = "/api/*"

# ─────────────────────────────────────────────
# 重定向规则（作为 Edge Function 失败时的 fallback）
# ─────────────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "https://ai-native-ip-production.up.railway.app/api/:splat"
  status = 200
  force = true

# 健康检查端点
[[redirects]]
  from = "/health"
  to = "https://ai-native-ip-production.up.railway.app/health"
  status = 200
  force = true

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─────────────────────────────────────────────
# 静态资源缓存优化
# ─────────────────────────────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─────────────────────────────────────────────
# CORS 头（全局）
# ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[dev]
  command = "npm run dev"
  targetPort = 3000
  publish = ".next"
