[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  # 重要：设置此变量让浏览器直接连接 Railway API，绕过 Netlify 边缘代理
  # 这可以避免文件上传时的内存问题和 502 超时错误
  NEXT_PUBLIC_API_DIRECT_ORIGIN = "https://ai-native-ip-production.up.railway.app"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# 注意：当 NEXT_PUBLIC_API_DIRECT_ORIGIN 设置后，浏览器会直连 Railway，
# 以下 redirects 实际上不会用于 API 请求，但保留用于 SEO/其他用途
[[redirects]]
  from = "/api/*"
  to = "https://ai-native-ip-production.up.railway.app/api/:splat"
  status = 200
  force = true

# 健康检查端点 - 用于监控
[[redirects]]
  from = "/health"
  to = "https://ai-native-ip-production.up.railway.app/health"
  status = 200
  force = true

[dev]
  command = "npm run dev"
  targetPort = 3000
  publish = ".next"

# 静态资源缓存优化
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
