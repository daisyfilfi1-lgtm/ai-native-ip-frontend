[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  NEXT_PUBLIC_API_URL = "https://ai-native-ip-production.up.railway.app"

# API 代理到后端
# 精确匹配 API 路由
[[redirects]]
  from = "/api/*"
  to = "https://ai-native-ip-production.up.railway.app/api/:splat"
  status = 200
  force = true

# 处理其他所有路由（SPA回退）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  targetPort = 3000
  publish = ".next"

# 缓存配置
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
