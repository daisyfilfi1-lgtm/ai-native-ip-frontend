[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  NEXT_PUBLIC_API_MODE = "edge"

# Edge Functions 配置
[edge]
  # 绑定环境变量

# 路由规则：将 /api/* 请求转发到 Edge Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api-proxy"
  status = 200
  force = true

# 上传专用路由
[[redirects]]
  from = "/api/*upload*"
  to = "/.netlify/functions/api-proxy"
  status = 200
  force = true

[[redirects]]
  from = "/api/*ingest*"
  to = "/.netlify/functions/api-proxy"
  status = 200
  force = true

# 健康检查端点
[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api-proxy"
  status = 200
  force = true

[[plugins]]
  package = "@netlify/plugin-nextjs"

# 静态资源缓存优化
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API 响应不缓存
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[dev]
  command = "npm run dev"
  targetPort = 3000
  publish = ".next"
