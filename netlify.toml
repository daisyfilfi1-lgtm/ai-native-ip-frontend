[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  # 浏览器直连 Railway API，避免经 Netlify /api 边缘代理时出现 502（与 README/.env.example 一致）
  NEXT_PUBLIC_API_URL = "https://ai-native-ip-production.up.railway.app/api/v1"

# API 代理到后端（未设置 NEXT_PUBLIC_API_URL 时仍可用；生产构建已默认直连 Railway）
# 必须在 SPA 回退之前
[[redirects]]
  from = "/api/*"
  to = "https://ai-native-ip-production.up.railway.app/api/:splat"
  status = 200
  force = true

# Next.js 14 App Router 自动处理路由
# 不需要手动配置 SPA 回退

[dev]
  command = "npm run dev"
  targetPort = 3000
  publish = ".next"

# 缓存配置
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
